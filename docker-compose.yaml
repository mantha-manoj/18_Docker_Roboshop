services:
  catalogue:
    build: ./catalogue
    image: manojmantha/catalogue:1.2.0
    container_name: catalogue
    depends_on:
    - mongodb
  user:
    build: ./user
    image: manojmantha/user:1.2.0
    container_name: user
    depends_on:
    - redis
    - mongodb
  cart:
    build: ./cart
    image: manojmantha/cart:1.2.0
    container_name: cart
    depends_on:
    - redis
    - catalogue
  shipping:
    build: ./shipping
    image: manojmantha/shipping:1.2.0
    container_name: shipping
    depends_on:
    - mysql
    - cart
  payment:
    build: ./payment
    image: manojmantha/payment:1.0.0
    container_name: payment
    depends_on:
    - rabbitmq
    - cart
    - user
  frontend:
    build: ./frontend
    image: manojmantha/frontend:1.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart
    - shipping
    - payment
  mongodb:
    build: ./mongodb 
    image: manojmantha/mongodb:1.0.0 
    container_name: mongodb
    volumes:
    - mongodb:/data/db

  redis:
    image: redis:7.0
    container_name: redis
    volumes:
    - redis:/data

  mysql:
    build: ./mysql
    image: manojmantha/mysql:1.0.0
    container_name: mysql
    volumes:
    - mysql:/var/lib/mysql

  rabbitmq:
    image: rabbitmq:3
    environment: 
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    container_name: rabbitmq
    volumes:
    - rabbitmq:/var/lib/rabbitmq

networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually

volumes:
  mongodb: # docker volume create mongodb
  redis:
  mysql:
  rabbitmq:
